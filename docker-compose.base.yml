version: "3.9"

# Base services shared by dev and prod.
# Never use this file directly — extend it via docker-compose.dev.yml or docker-compose.prod.yml.

x-common-app: &common-app
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    DATABASE_URL: ${DATABASE_URL:-sqlite:////data/gen_agent.db}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
  depends_on:
    db:
      condition: service_healthy

services:
  app:
    <<: *common-app
    image: gen-agent:latest

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gen_agent}
      POSTGRES_USER: ${POSTGRES_USER:-gen_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gen_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

networks:
  default:
    name: gen_agent_net
