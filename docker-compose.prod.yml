version: "3.9"

# Production deployment — registry image, nginx TLS termination, resource limits.
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Requirements:
#   - .env with POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   - config/certs/fullchain.pem + config/certs/privkey.pem (TLS certificates)
#   - See docs/guides/DOCKER.md for full setup guide.

services:
  app:
    image: ghcr.io/davidemeda/new-gen-agent:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?required}
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  db_data:

networks:
  default:
    name: gen_agent_net
