version: "3.9"

# Stanford UI overlay — adds the Django frontend to the modular backend.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.stanford.yml up
#
# Prerequisites:
#   - environment/frontend_server/ present on disk (not ignored by Docker)
#   - .env with STANFORD_SIM_CODE (default: gen_agent_run)
#
# Documentation: docs/guides/STANFORD_UI.md

services:
  app:
    environment:
      STANFORD_UI_EXPORT: "true"
      STANFORD_UI_DIR: "/stanford_ui"
      STANFORD_SIM_CODE: ${STANFORD_SIM_CODE:-gen_agent_run}
      LOG_FORMAT: ${LOG_FORMAT:-dev}
    volumes:
      - stanford_storage:/stanford_ui/storage
      - stanford_temp:/stanford_ui/temp_storage

  stanford-ui:
    build:
      context: environment/frontend_server
      dockerfile: Dockerfile.stanford
    ports:
      - "${STANFORD_UI_PORT:-8080}:8080"
    environment:
      DJANGO_SETTINGS_MODULE: frontend_server.settings.local
      PYTHONUNBUFFERED: "1"
    volumes:
      - stanford_storage:/app/storage
      - stanford_temp:/app/temp_storage
    depends_on:
      - app
    restart: unless-stopped

volumes:
  stanford_storage:
  stanford_temp:
