name: Security

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 1"  # every Monday at 03:00 UTC

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: dev
      - run: bandit -r gen_agent/ -c pyproject.toml -ll

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: dev
      - run: pip-audit

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

  trivy:
    name: Trivy (Docker image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t gen-agent:ci -f Dockerfile .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: gen-agent:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
