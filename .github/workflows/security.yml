name: Security

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 1"  # every Monday at 03:00 UTC

# ponytail: CodeQL removed — requires GitHub Advanced Security (paid) for private repos.
# Bandit and Trivy are informational: they report findings but never block merges.

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: dev
      # --exit-zero: always exits 0 so findings are visible in logs but don't block CI
      - run: bandit -r gen_agent/ -c pyproject.toml -ll --exit-zero

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          extras: dev
      # Upgrade setuptools to patch PYSEC-2026-3447 (runner ships 79.x, fix is 83+)
      - run: pip install "setuptools>=83" -q -U
      - run: pip-audit

  trivy:
    name: Trivy (Docker image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t gen-agent:ci -f Dockerfile .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: gen-agent:ci
          format: table
          exit-code: "0"        # informational — doesn't block merge
          severity: CRITICAL,HIGH
