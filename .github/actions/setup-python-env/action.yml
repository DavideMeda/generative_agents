name: "Setup Python Environment"
description: "Install Python, cache pip, and install project dependencies"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  extras:
    description: "pip extras to install (e.g. 'dev,docs')"
    required: false
    default: "dev"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          pip-${{ runner.os }}-py${{ inputs.python-version }}-

    - name: Install project
      shell: bash
      run: pip install -e ".[${{ inputs.extras }}]" --quiet
